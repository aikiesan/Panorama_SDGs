server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback so React Router deep links resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the hashed static assets produced by the Vite build.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
